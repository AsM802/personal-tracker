<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — HabitFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <div class="auth-card">
    <div class="logo">
      <span class="logo-icon">🔑</span>
      <h1 class="logo-text">Reset Password</h1>
    </div>
    <p class="subtitle">Enter your registered email to get a reset code</p>

    <div id="error-message" class="error-box" style="display: none;"></div>
    <div id="success-message" class="error-box" style="display: none; background: rgba(34, 197, 94, 0.2); border-color: #22c55e; color: #86efac;"></div>

    <form id="forgot-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required placeholder="name@example.com" autocomplete="email">
      </div>

      <button type="submit" id="submit-btn" class="btn-primary">Get Reset Code</button>
    </form>

    <div class="auth-footer">
      <p>Remembered your password? <a href="login.html">Sign In</a></p>
    </div>
  </div>

  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const errorEl = document.getElementById('error-message');
      const successEl = document.getElementById('success-message');
      const btn = document.getElementById('submit-btn');
      
      errorEl.style.display = 'none';
      successEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Generating code...';
      
      try {
        const res = await fetch('/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (data.success) {
          successEl.innerHTML = `<strong>Reset Code Generated:</strong> <span style="font-size: 20px; letter-spacing: 2px; color: #fff; font-weight: 700;">${data.resetToken || 'CODE12'}</span><br><br><a href="reset-password.html?email=${encodeURIComponent(email)}&code=${data.resetToken || ''}" style="color: #fff; font-weight: 700; text-decoration: underline;">Click here to set your new password ➔</a>`;
          successEl.style.display = 'block';
        } else {
          errorEl.textContent = data.error || 'Failed to request reset';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Get Reset Code';
      }
    });
  </script>
</body>
</html>
