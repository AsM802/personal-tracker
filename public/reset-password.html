<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — HabitFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <div class="auth-card">
    <div class="logo">
      <span class="logo-icon">🔒</span>
      <h1 class="logo-text">Set New Password</h1>
    </div>
    <p class="subtitle">Enter your code and choose a new password</p>

    <div id="error-message" class="error-box" style="display: none;"></div>
    <div id="success-message" class="error-box" style="display: none; background: rgba(34, 197, 94, 0.2); border-color: #22c55e; color: #86efac;"></div>

    <form id="reset-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required placeholder="name@example.com">
      </div>

      <div class="form-group">
        <label for="resetToken">Reset Code</label>
        <input type="text" id="resetToken" required placeholder="e.g., A1B2C3" style="letter-spacing: 2px; text-transform: uppercase;">
      </div>

      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" required minlength="6" placeholder="••••••••">
      </div>

      <button type="submit" id="submit-btn" class="btn-primary">Update Password</button>
    </form>

    <div class="auth-footer">
      <p>Back to <a href="login.html">Sign In</a></p>
    </div>
  </div>

  <script>
    // Auto fill from URL query params
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('email')) document.getElementById('email').value = urlParams.get('email');
    if (urlParams.has('code')) document.getElementById('resetToken').value = urlParams.get('code');

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const resetToken = document.getElementById('resetToken').value.trim();
      const newPassword = document.getElementById('newPassword').value;
      const errorEl = document.getElementById('error-message');
      const successEl = document.getElementById('success-message');
      const btn = document.getElementById('submit-btn');
      
      errorEl.style.display = 'none';
      successEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Updating...';
      
      try {
        const res = await fetch('/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, resetToken, newPassword })
        });
        const data = await res.json();
        if (data.success) {
          successEl.textContent = data.message || 'Password updated successfully! Redirecting...';
          successEl.style.display = 'block';
          setTimeout(() => window.location.href = '/login.html', 2000);
        } else {
          errorEl.textContent = data.error || 'Failed to update password';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
